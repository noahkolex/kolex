<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Advertiser portal · Kolex</title>
  <link rel="icon" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/brand.css" />
</head>
<body>
  <header class="nav" data-nav></header>

  <main class="wrap" style="padding-top:40px;padding-bottom:60px">
    <!-- Login -->
    <div id="login" class="hide" style="max-width:420px;margin:40px auto">
      <span class="eyebrow">Advertiser portal</span>
      <h1 style="font-size:28px;font-weight:600;letter-spacing:-.02em;margin:12px 0 6px">Sign in to manage campaigns.</h1>
      <p class="muted" style="margin-top:0">Enter the email you launched with.</p>
      <div id="login-err" class="errors hide"></div>
      <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@acme.com" /></div>
      <div class="field"><label>Password</label><input type="password" id="password" placeholder="Your password" autocomplete="current-password" /></div>
      <button class="btn btn-primary btn-lg" id="signin" style="width:100%;justify-content:center">Sign in</button>
      <p class="center muted" style="margin-top:14px;font-size:13px">No campaigns yet? <a href="/advertise">Launch one →</a></p>
    </div>

    <!-- Dashboard -->
    <div id="dash" class="hide">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div><span class="eyebrow">Advertiser</span><h1 style="font-size:26px;font-weight:600;letter-spacing:-.02em;margin:8px 0 0" id="who"></h1></div>
        <span class="spacer" style="flex:1"></span>
        <a class="btn btn-primary" href="/advertise">New campaign</a>
        <button class="btn btn-ghost" id="logout">Sign out</button>
      </div>

      <div id="paid-banner" class="success hide" style="margin-top:18px;padding:12px 16px;font-size:14px">
        ✓ Payment received. Your campaign is live in the auction.
      </div>

      <div class="stats-strip" id="adv-stats" style="margin-top:22px"></div>

      <table class="board" style="margin-top:8px">
        <thead>
          <tr>
            <th>Campaign</th>
            <th class="num">Bid / 1k</th>
            <th class="num hide-sm">Impressions</th>
            <th class="num hide-sm">Clicks</th>
            <th class="num">Spend</th>
            <th class="num">Status</th>
          </tr>
        </thead>
        <tbody id="adv-body"></tbody>
      </table>
    </div>
  </main>

  <footer><div class="wrap"><span>© 2026 Kolex</span><span class="spacer"></span><a href="/">Home</a><a href="/advertise">Advertise</a></div></footer>

  <script type="module">
    import { api, money, num, mountNav, store } from "/assets/app.js";
    mountNav();

    const $ = (id) => document.getElementById(id);

    async function loadDash() {
      const token = store.get("advToken");
      if (!token) return showLogin();
      try {
        const data = await api("/api/advertiser/campaigns", { token });
        $("login").classList.add("hide");
        $("dash").classList.remove("hide");
        $("who").textContent = data.email;
        const totalImp = data.campaigns.reduce((s, c) => s + c.impressions, 0);
        const totalClk = data.campaigns.reduce((s, c) => s + c.clicks, 0);
        $("adv-stats").innerHTML = [
          ["Campaigns", num(data.campaigns.length)],
          ["Impressions served", num(totalImp)],
          ["Clicks", num(totalClk)],
          ["Total spend", money(data.totalSpendUsd)],
        ].map(([l, v]) => `<div class="stat-chip"><b>${v}</b><span>${l}</span></div>`).join("");
        const statusCell = (c) => {
          if (c.status === "active") return '<span class="pill live">Live</span>';
          if (c.status === "completed") return '<span class="pill done">Done</span>';
          return `<span class="pill unpaid">Unpaid</span>
                  <button class="btn btn-gold" style="padding:4px 10px;font-size:11px;margin-left:6px" data-pay="${c.id}">Pay now</button>`;
        };
        $("adv-body").innerHTML = data.campaigns.length ? data.campaigns
          .sort((a, b) => (b.status === "active") - (a.status === "active") || b.bidPerBlock - a.bidPerBlock)
          .map((c) => `
            <tr>
              <td><div class="brandcell">${c.iconDataUrl ? `<img src="${c.iconDataUrl}" alt="">` : ""}<span>${c.brand}</span></div>
                  <div class="muted" style="font-size:12px;margin-top:2px">${c.text}</div></td>
              <td class="num bid">${money(c.bidPerBlock)}</td>
              <td class="num hide-sm mono">${num(c.impressions)}</td>
              <td class="num hide-sm mono">${num(c.clicks)}</td>
              <td class="num mono">${money(c.spendUsd)}</td>
              <td class="num">${statusCell(c)}</td>
            </tr>`).join("")
          : '<tr><td colspan="6" class="muted center" style="padding:24px">No campaigns yet.</td></tr>';
        // Wire "Pay" buttons for unpaid campaigns → re-checkout.
        for (const btn of document.querySelectorAll("[data-pay]")) {
          btn.addEventListener("click", async () => {
            const r = await api(`/api/advertiser/campaigns/${btn.dataset.pay}/checkout`, {
              method: "POST", token: store.get("advToken"),
            });
            location.href = r.checkoutUrl;
          });
        }
      } catch {
        store.del("advToken");
        showLogin();
      }
    }

    function showLogin() { $("dash").classList.add("hide"); $("login").classList.remove("hide"); }

    $("signin").addEventListener("click", async () => {
      $("login-err").classList.add("hide");
      try {
        const { token } = await api("/api/auth", { method: "POST", body: { email: $("email").value, password: $("password").value, kind: "advertiser" } });
        store.set("advToken", token);
        loadDash();
      } catch (e) {
        $("login-err").textContent = e.message;
        $("login-err").classList.remove("hide");
      }
    });
    $("password")?.addEventListener("keydown", (e) => { if (e.key === "Enter") $("signin").click(); });
    $("logout").addEventListener("click", () => { store.del("advToken"); showLogin(); });

    if (new URLSearchParams(location.search).get("paid") === "1") {
      $("paid-banner").classList.remove("hide");
    }
    loadDash();
  </script>
</body>
</html>
