<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Kolex">
  <defs>
    <linearGradient id="k-coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD86B"/>
      <stop offset="1" stop-color="#FFC53D"/>
    </linearGradient>
  </defs>
  <!-- Spinner arc: 270deg loading indicator, rounded cap, paying out into a coin -->
  <path d="M46 50
           A22 22 0 1 0 17 53"
        fill="none" stroke="#16E0A3" stroke-width="6" stroke-linecap="round"/>
  <!-- Coin at the arc's terminus (the spinner pays out) -->
  <circle cx="46" cy="18" r="11" fill="url(#k-coin)"/>
  <circle cx="46" cy="18" r="11" fill="none" stroke="#0F1216" stroke-width="2" stroke-opacity="0.18"/>
  <!-- $ glyph drawn as paths -->
  <path d="M46 11.5 V24.5" fill="none" stroke="#0F1216" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M49.6 14.4 a3.4 3.0 0 0 0 -3.6 -2.4 a3.2 2.8 0 0 0 -0.3 5.6
           a3.2 2.8 0 0 1 -0.3 5.6 a3.4 3.0 0 0 1 -3.6 -2.4"
        fill="none" stroke="#0F1216" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
