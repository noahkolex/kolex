<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Claude-like fixture</title>
  <style>
    body { margin: 0; min-height: 100vh; background: #1f1e1d; color: #e9e6e1;
      font: 16px/1.6 -apple-system, system-ui, sans-serif; }
    main { max-width: 740px; margin: 0 auto; padding: 56px 24px 160px; }
    .user { text-align: right; margin: 0 0 28px; }
    .user span { background: #2a2927; padding: 10px 16px; border-radius: 16px; display: inline-block; }
    .turn { position: relative; }
    /* The Claude wait state: a starburst SVG (SMIL) and an empty
       streaming-text placeholder, side by side — the cluster case. */
    .wait { display: none; align-items: center; gap: 14px; }
    .wait.on { display: flex; }
    .placeholder { width: 22px; height: 22px; border-radius: 50%;
      background: conic-gradient(#e0936b, transparent); animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .composer { position: fixed; bottom: 0; left: 0; right: 0; padding: 18px 24px 30px;
      display: flex; justify-content: center; background: linear-gradient(transparent, #1f1e1d 40%); }
    .composer .box { width: min(700px, 86vw); background: #2a2927; border: 1px solid #3a3836;
      border-radius: 20px; padding: 14px 18px; }
    .composer [contenteditable] { outline: none; color: #e9e6e1; min-height: 24px; }
    .stop { display: none; }
    .stop.on { display: inline-block; }
  </style>
</head>
<body>
  <main>
    <div class="user"><span>i want you to generate a 10 page report on it</span></div>
    <div class="turn">
      <div class="answer" style="display:none">Here is the report…</div>
      <div class="wait" id="wait">
        <!-- bare rotating starburst, animated by SMIL (getAnimations can't see it) -->
        <svg id="starburst" width="34" height="34" viewBox="0 0 34 34" fill="none" stroke="#e0936b" stroke-width="2" stroke-linecap="round">
          <g>
            <animateTransform attributeName="transform" type="rotate" from="0 17 17" to="360 17 17" dur="1.1s" repeatCount="indefinite"/>
            <line x1="17" y1="3" x2="17" y2="9"/><line x1="17" y1="25" x2="17" y2="31"/>
            <line x1="3" y1="17" x2="9" y2="17"/><line x1="25" y1="17" x2="31" y2="17"/>
            <line x1="7" y1="7" x2="11" y2="11"/><line x1="23" y1="23" x2="27" y2="27"/>
            <line x1="7" y1="27" x2="11" y2="23"/><line x1="23" y1="11" x2="27" y2="7"/>
          </g>
        </svg>
        <!-- empty streaming-text placeholder that ALSO animates (CSS) -->
        <span class="placeholder"></span>
      </div>
    </div>
  </main>
  <div class="composer">
    <div class="box">
      <div contenteditable="true" id="input" data-placeholder="Reply to Claude…"></div>
      <button class="stop" id="stop" aria-label="Stop response">stop</button>
    </div>
  </div>

  <script>
    window.__KOLEX_SITE = {
      surface: "claude",
      busySelectors: ['button[aria-label="Stop response"].on', '.wait.on'],
      spinnerSelectors: [], // force the heuristic / cluster path
    };
  </script>
  <script src="./harness.js"></script>
  <script>
    // Drive a busy state on demand from the test via window.__setBusy.
    const wait = document.getElementById("stop");
    function setBusy(b) {
      document.getElementById("wait").classList.toggle("on", b);
      document.getElementById("stop").classList.toggle("on", b);
    }
    window.__setBusy = setBusy;
    setBusy(true);
  </script>
  <script src="../../extension/content.js"></script>
</body>
</html>
