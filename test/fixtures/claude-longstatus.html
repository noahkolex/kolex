<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Claude long-status fixture (text wider than the ad)</title>
  <style>
    body { margin: 0; min-height: 100vh; background: #1f1e1d; color: #e9e6e1;
      font: 16px/1.7 -apple-system, system-ui, sans-serif; }
    main { max-width: 740px; margin: 0 auto; padding: 56px 24px 200px; }
    /* A loading row whose STATUS TEXT is longer than the ad pill — the whole
       row must be hidden so no text peeks out beside the ad. */
    .loader { display: inline-flex; align-items: center; gap: 10px; color: #b8b3ab; }
    .loader svg line { animation: shimmer 1.2s ease-in-out infinite; }
    @keyframes shimmer { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    .label { white-space: nowrap; }
    .composer { position: fixed; bottom: 0; left: 0; right: 0; padding: 18px 24px 30px;
      display: flex; justify-content: center; background: linear-gradient(transparent, #1f1e1d 45%); }
    .composer .box { width: min(700px, 86vw); background: #2a2927; border: 1px solid #3a3836;
      border-radius: 20px; padding: 14px 18px; }
    .composer [contenteditable] { outline: none; color: #e9e6e1; min-height: 24px; }
  </style>
</head>
<body>
  <main>
    <div class="turn">
      <div class="loader" id="loader">
        <svg id="star" width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#e0936b" stroke-width="2" stroke-linecap="round">
          <line x1="11" y1="1" x2="11" y2="6"/><line x1="11" y1="16" x2="11" y2="21"/>
          <line x1="1" y1="11" x2="6" y2="11"/><line x1="16" y1="11" x2="21" y2="11"/>
        </svg>
        <span class="label" id="label">Researching the web across many sources and reading the documentation</span>
      </div>
    </div>
  </main>
  <div class="composer">
    <div class="box">
      <div contenteditable="true" id="input" data-placeholder="Reply to Claude…"></div>
      <button id="stop" aria-label="Stop response" style="display:inline-block">stop</button>
    </div>
  </div>

  <script>
    window.__KOLEX_SITE = {
      surface: "claude",
      busySelectors: ['button[aria-label="Stop response"]', '.loader'],
      spinnerSelectors: [],
    };
  </script>
  <script src="./harness.js"></script>
  <script src="../../extension/content.js"></script>
</body>
</html>
