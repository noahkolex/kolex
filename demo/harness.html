<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Kolex demo harness — fake chat UI</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; flex-direction: column;
      background: #212121; color: #ececec;
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    main { flex: 1; max-width: 720px; margin: 0 auto; padding: 48px 24px 140px; width: 100%; box-sizing: border-box; }
    .msg { margin-bottom: 28px; }
    .who { font-size: 12px; color: #9a9a9a; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    .spinner { display: none; }
    .spinner.on { display: block; }
    .composer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 24px 28px; display: flex; gap: 10px; justify-content: center;
      background: linear-gradient(transparent, #212121 30%);
    }
    .composer textarea {
      width: min(640px, 80vw); padding: 14px 18px; border-radius: 24px; resize: none;
      border: 1px solid #424242; background: #2f2f2f; color: #ececec; font-size: 15px; font-family: inherit;
    }
    .stop {
      display: none; border: 1px solid #555; background: #2f2f2f; color: #ececec;
      border-radius: 50%; width: 48px; height: 48px; cursor: pointer; font-size: 16px;
    }
    .stop.on { display: block; }
    .note { position: fixed; top: 12px; right: 16px; font-size: 12px; color: #777; }
  </style>
</head>
<body>
  <div class="note">kolex demo · the bare starburst (no text) is replaced inline while busy (6s busy / 2s idle)</div>
  <main>
    <div class="msg"><div class="who">You</div>Plan a two-week trip to Japan on a budget.</div>
    <div class="msg">
      <div class="who">Assistant</div>
      <div id="answer" style="display:none">Here's a two-week itinerary…</div>
      <!-- A bare SMIL starburst with NO sibling text — the claude.ai case. -->
      <svg class="spinner" id="spinner" width="34" height="34" viewBox="0 0 34 34" fill="none" stroke="#e0936b" stroke-width="2" stroke-linecap="round">
        <g>
          <animateTransform attributeName="transform" type="rotate" from="0 17 17" to="360 17 17" dur="1.1s" repeatCount="indefinite"/>
          <line x1="17" y1="3"  x2="17" y2="9"/>
          <line x1="17" y1="25" x2="17" y2="31"/>
          <line x1="3"  y1="17" x2="9"  y2="17"/>
          <line x1="25" y1="17" x2="31" y2="17"/>
          <line x1="7"  y1="7"  x2="11" y2="11"/>
          <line x1="23" y1="23" x2="27" y2="27"/>
          <line x1="7"  y1="27" x2="11" y2="23"/>
          <line x1="23" y1="11" x2="27" y2="7"/>
        </g>
      </svg>
    </div>
  </main>
  <form class="composer" data-testid="composer" onsubmit="return false">
    <textarea placeholder="Message…" rows="1"></textarea>
    <button class="stop" id="stop" data-testid="stop-button" aria-label="Stop streaming" title="Stop">■</button>
  </form>

  <script>
    // ---- Stub the extension APIs so extension/content.js runs on file:// ----
    let earned = 0, accrued = 0, last = null, idx = 0;
    // A branded advertiser (cobalt "L" logo + orange accent) plus house ads,
    // to show full brand takeover of the loading indicator.
    const LINEAR_LOGO = "data:image/svg+xml;base64," + btoa(
      '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><rect width="32" height="32" rx="7" fill="#5E6AD2"/><path d="M7 18.5 13.5 25A9 9 0 0 1 7 18.5Z M7 14.2A12.8 12.8 0 0 0 17.8 25 M7.6 10.6A16.4 16.4 0 0 0 21.4 24.4" stroke="#fff" stroke-width="2.1" fill="none" stroke-linecap="round"/></svg>'
    );
    const ADS = [
      { id: "ad-linear", brand: "Linear", text: "The issue tracker teams actually enjoy", iconDataUrl: LINEAR_LOGO, accent: "#5E6AD2" },
      { id: "house-ramp", brand: "Ramp", text: "Close your books 8x faster — finance built for builders", house: true },
      { id: "house-foundersnetwork", brand: "Founders Network", text: "Peer mentorship for tech founders, since 2011", house: true },
    ];
    window.chrome = {
      storage: { local: { get: async () => ({ sites: [{
        surface: "chatgpt",
        hosts: [location.hostname], // "" on file:// — matches this page only
        busySelectors: ['button[data-testid="stop-button"].on', ".spinner.on"],
        spinnerSelectors: [], // force the selector-free animation heuristic
      }] }) } },
      runtime: {
        sendMessage: async (msg) => {
          if (msg.type === "kolex:tick") {
            const now = Date.now();
            if (last && now - last <= 4000) accrued += now - last;
            last = now;
            if (accrued >= 5000) { accrued -= 5000; idx = (idx + 1) % ADS.length; earned += 0.005; }
            return { serving: true, ad: ADS[idx], estEarnedUsd: earned, impressionRecorded: false };
          }
          if (msg.type === "kolex:open-page") { alert("would open kolex.ai/" + msg.page); return { ok: true };
          }
          if (msg.type === "kolex:click") { alert("click recorded → would open kolex.ai/r/" + msg.adId); return { ok: true }; }
          return { ok: true };
        },
      },
    };

    // ---- Fake chat loop: 6s busy, 2s idle ----
    const spinner = document.getElementById("spinner");
    const stop = document.getElementById("stop");
    const answer = document.getElementById("answer");
    function setBusy(b) {
      spinner.classList.toggle("on", b);
      stop.classList.toggle("on", b);
      answer.style.display = b ? "none" : "block";
    }
    setBusy(true);
    setInterval(() => { setBusy(true); setTimeout(() => setBusy(false), 6000); }, 8000);
  </script>
  <script src="../extension/content.js"></script>
</body>
</html>
